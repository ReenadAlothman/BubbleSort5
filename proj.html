

<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>Bubble Sort Interface</title>

<style>


body {

  font-family: Arial;

  background: #f4f4f4;

  text-align: center;

}



h1 {
color:#18548B
;
  margin-top: 40px;

}



.container {

  background: #D2E5F7
;

  padding: 30px;

  width: 600px;

  margin: 40px auto;

  border-radius: 10px;

  box-shadow: 0 0 10px rgba(0,0,0,0.1);

}



input {

  width: 90%;

  padding: 10px;

  margin: 15px 0;

  border-radius: 5px;

  border: 1px solid #ccc;

}



button {

  padding: 10px 20px;

  background: brown;

  color: white;

  border: none;

  border-radius: 5px;

  cursor: pointer;

}



button:hover {

  background: #2980b9;

}



.output {
color:#18548B;
  margin-top: 20px;

}



#result {

  color:#2C6412
;

  font-weight: bold;

}


</style>
</head>



<body>



<h1>Bubble Sort</h1>



<div class="container">



  <label>Enter array elements (comma separated):</label>

  <input type="text" id="arrayInput" placeholder="e.g. 5, 3, 8, 1, 2">



  <button onclick="sortArray()">Sort Array</button>



  <div class="output">

    <p><strong>Sorted Array:</strong></p>

    <p id="result"></p>

  </div>



</div>



<script>
function sortArray() {

  let input = document.getElementById("arrayInput").value;



  // A = input array

  let A = input.split(",").map(Number);

  let n = A.length;



  // For i = 0 to n-2

  for (let i = 0; i <= n - 2; i++) {



    // For j = 0 to n-2-i

    for (let j = 0; j <= n - 2 - i; j++) {



      // If A[j+1] < A[j]

      if (A[j + 1] < A[j]) {



        // Swap A[j] and A[j+1]

        let temp = A[j];

        A[j] = A[j + 1];

        A[j + 1] = temp;

      }

    }

  }



  // Output result

  document.getElementById("result").innerText = A.join(", ");

}</script>

</body>

</html>
